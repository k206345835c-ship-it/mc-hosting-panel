<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MC Hosting Panel</title>
  <style>
    body { background:#0d1117; color:white; font-family:Arial; text-align:center; margin-top:100px; }
    .box { background:#161b22; padding:40px; border-radius:12px; display:inline-block; }
    button { padding:10px 20px; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>MC Hosting Panel</h1>
    <p id="status">Sprawdzanie statusu...</p>
    <button onclick="check()">Sprawdź status</button>
  </div>

  <script>
    function check(){
      fetch('/api/status')
        .then(r=>r.json())
        .then(d=>document.getElementById('status').innerText=d.status);
    }
  </script>
</body>
</html>
